name: Publish

on:
  release:
    types: [published]

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      prerelease: ${{ steps.version.outputs.prerelease }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install build tooling
        run: python -m pip install --upgrade build twine packaging
      - name: Verify tag matches package version
        id: version
        run: |
          python - <<'PY'
          import os
          import tomllib
          from packaging.version import Version

          tag = os.environ["GITHUB_REF_NAME"]
          with open("pyproject.toml", "rb") as handle:
              version = tomllib.load(handle)["project"]["version"]
          expected = f"v{version}"
          if tag != expected:
              raise SystemExit(f"release tag {tag!r} does not match package version {version!r}; expected {expected!r}")
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write(f"prerelease={str(Version(version).is_prerelease).lower()}\n")
          PY
      - name: Build
        run: python -m build
      - name: Check metadata
        run: twine check dist/*
      - name: Verify prompt package data
        run: |
          python - <<'PY'
          from pathlib import Path
          from zipfile import ZipFile

          wheels = list(Path("dist").glob("*.whl"))
          if len(wheels) != 1:
              raise SystemExit(f"expected one wheel, found {len(wheels)}")
          with ZipFile(wheels[0]) as wheel:
              names = set(wheel.namelist())
          expected = "supervisor/prompts/prompts.toml"
          if expected not in names:
              raise SystemExit(f"{expected} missing from {wheels[0]}")
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*

  publish-testpypi:
    name: Publish to TestPyPI
    needs: build
    if: needs.build.outputs.prerelease == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    name: Publish to PyPI
    needs: build
    if: needs.build.outputs.prerelease == 'false'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1
